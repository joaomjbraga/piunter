name: CI Linux Only

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch == 'arm64' && 'arm64' || 'amd64' }}
        run: |
          go build -o piunter-linux-${{ matrix.arch }} -ldflags="-s -w" ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: piunter-linux-${{ matrix.arch }}
          path: piunter-linux-${{ matrix.arch }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: piunter-linux-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: piunter-linux-*
          generate_release_notes: true
